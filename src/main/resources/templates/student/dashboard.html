<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Student Dashboard')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-4 flex-grow-1">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <!-- Welcome -->
    <div class="card border-0 rounded-4 bg-primary text-white mb-4 shadow">
        <div class="card-body p-4 d-flex align-items-center gap-3">
            <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center" style="width:60px;height:60px;">
                <i class="bi bi-person-fill fs-3"></i>
            </div>
            <div>
                <h4 class="fw-bold mb-0">Welcome back, <span th:text="${student.fullName}">Student</span>!</h4>
                <small class="opacity-75">Ready to test your knowledge today?</small>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Available Exams -->
        <div class="col-md-8">
            <h5 class="fw-bold mb-3"><i class="bi bi-journal-text me-2 text-primary"></i>Available Exams</h5>

            <div th:if="${#lists.isEmpty(activeExams)}" class="card border-0 bg-light rounded-4 text-center py-5 text-muted">
                <i class="bi bi-journal-x fs-1 mb-2"></i>
                <p>No exams available right now. Check back later!</p>
            </div>

            <div th:each="exam : ${activeExams}" class="card border-0 shadow-sm rounded-4 mb-3 exam-card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h5 class="fw-bold mb-1" th:text="${exam.title}"></h5>
                            <p class="text-muted small mb-2" th:text="${exam.description}"></p>
                            <div class="d-flex gap-3 text-muted small">
                                <span><i class="bi bi-clock me-1"></i><span th:text="${exam.durationMinutes}"></span> min</span>
                                <span><i class="bi bi-award me-1"></i><span th:text="${exam.totalMarks}"></span> marks</span>
                                <span><i class="bi bi-check2-circle me-1"></i>Pass: <span th:text="${exam.passingMarks}"></span></span>
                            </div>
                        </div>
                        <a th:href="@{/student/exam/{id}/start(id=${exam.id})}" class="btn btn-primary">
                            <i class="bi bi-play-fill me-1"></i>Start
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- My Results -->
        <div class="col-md-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-clipboard-data me-2 text-success"></i>My Results</h5>

            <div th:if="${#lists.isEmpty(results)}" class="card border-0 bg-light rounded-4 text-center py-4 text-muted">
                <i class="bi bi-bar-chart fs-2 mb-2"></i>
                <p class="small">No results yet.<br/>Take an exam to see your scores!</p>
            </div>

            <div th:each="result : ${results}" class="card border-0 shadow-sm rounded-3 mb-3">
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <p class="fw-semibold mb-1 small" th:text="${result.exam.title}"></p>
                            <span th:if="${result.passed}" class="badge bg-success mb-1">Passed</span>
                            <span th:unless="${result.passed}" class="badge bg-danger mb-1">Failed</span>
                            <div class="text-muted small">
                                <strong th:text="${result.score}"></strong>/<span th:text="${result.totalMarks}"></span> marks
                            </div>
                        </div>
                        <a th:href="@{/student/result/{id}(id=${result.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-eye"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
