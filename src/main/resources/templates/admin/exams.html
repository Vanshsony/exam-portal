<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Exams')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-4 flex-grow-1">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold"><i class="bi bi-journal-text me-2 text-primary"></i>Manage Exams</h4>
        <a th:href="@{/admin/exams/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-2"></i>New Exam
        </a>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Duration</th>
                            <th>Marks</th>
                            <th>Pass</th>
                            <th>Status</th>
                            <th class="pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="exam, stat : ${exams}">
                            <td class="ps-4" th:text="${stat.count}"></td>
                            <td class="fw-semibold" th:text="${exam.title}"></td>
                            <td class="text-muted small" th:text="${exam.description}"></td>
                            <td><i class="bi bi-clock me-1 text-muted"></i><span th:text="${exam.durationMinutes} + ' min'"></span></td>
                            <td th:text="${exam.totalMarks}"></td>
                            <td th:text="${exam.passingMarks}"></td>
                            <td>
                                <span th:if="${exam.active}" class="badge bg-success">Active</span>
                                <span th:unless="${exam.active}" class="badge bg-secondary">Inactive</span>
                            </td>
                            <td class="pe-4">
                                <a th:href="@{/admin/exams/{id}/questions(id=${exam.id})}" class="btn btn-sm btn-outline-primary me-1" title="Questions">
                                    <i class="bi bi-question-circle"></i>
                                </a>
                                <a th:href="@{/admin/leaderboard/exam/{id}(id=${exam.id})}" class="btn btn-sm btn-outline-warning me-1" title="Leaderboard">
                                    <i class="bi bi-trophy"></i>
                                </a>
                                <form th:action="@{/admin/exams/{id}/toggle(id=${exam.id})}" method="post" class="d-inline">
                                    <button class="btn btn-sm btn-outline-secondary me-1" title="Toggle">
                                        <i class="bi bi-toggle-on"></i>
                                    </button>
                                </form>
                                <form th:action="@{/admin/exams/{id}/delete(id=${exam.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this exam and all its questions?')">
                                    <button class="btn btn-sm btn-outline-danger" title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(exams)}">
                            <td colspan="8" class="text-center text-muted py-4">No exams yet. <a th:href="@{/admin/exams/new}">Create one!</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
