<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-4 flex-grow-1">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0"><i class="bi bi-speedometer2 me-2 text-primary"></i>Admin Dashboard</h3>
            <p class="text-muted mb-0">Overview of the exam portal</p>
        </div>
        <a th:href="@{/admin/exams/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-2"></i>Create Exam
        </a>
    </div>

    <!-- Stats Cards -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-4 bg-primary text-white h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1"><i class="bi bi-journal-text"></i></div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${stats.totalExams}">0</div>
                        <div class="opacity-75">Total Exams</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-4 bg-success text-white h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1"><i class="bi bi-check-circle"></i></div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${stats.activeExams}">0</div>
                        <div class="opacity-75">Active Exams</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-4 bg-info text-white h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1"><i class="bi bi-people"></i></div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${studentCount}">0</div>
                        <div class="opacity-75">Students</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-4 bg-warning text-white h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="fs-1"><i class="bi bi-clipboard-check"></i></div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${stats.completedAttempts}">0</div>
                        <div class="opacity-75">Completed Attempts</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Exams Table -->
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
            <h5 class="fw-bold"><i class="bi bi-list-check me-2"></i>All Exams</h5>
        </div>
        <div class="card-body px-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Duration</th>
                            <th>Total Marks</th>
                            <th>Passing</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="exam, stat : ${recentExams}">
                            <td th:text="${stat.count}"></td>
                            <td class="fw-semibold" th:text="${exam.title}"></td>
                            <td><i class="bi bi-clock me-1 text-muted"></i><span th:text="${exam.durationMinutes} + ' min'"></span></td>
                            <td th:text="${exam.totalMarks}"></td>
                            <td th:text="${exam.passingMarks}"></td>
                            <td>
                                <span th:if="${exam.active}" class="badge bg-success">Active</span>
                                <span th:unless="${exam.active}" class="badge bg-secondary">Inactive</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/exams/{id}/questions(id=${exam.id})}" class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-question-circle"></i>
                                </a>
                                <form th:action="@{/admin/exams/{id}/toggle(id=${exam.id})}" method="post" class="d-inline">
                                    <button class="btn btn-sm btn-outline-warning me-1" title="Toggle Status">
                                        <i class="bi bi-toggle-on"></i>
                                    </button>
                                </form>
                                <form th:action="@{/admin/exams/{id}/delete(id=${exam.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this exam?')">
                                    <button class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(recentExams)}">
                            <td colspan="7" class="text-center text-muted py-4">No exams yet. <a th:href="@{/admin/exams/new}">Create one!</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
