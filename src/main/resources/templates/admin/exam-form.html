<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Create Exam')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-5">
                    <h4 class="fw-bold mb-4"><i class="bi bi-journal-plus me-2 text-primary"></i>Create New Exam</h4>

                    <form th:action="@{/admin/exams/new}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Exam Title *</label>
                            <input type="text" name="title" class="form-control" placeholder="e.g. Java Programming Basics" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea name="description" class="form-control" rows="3" placeholder="Brief description of the exam..."></textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Duration (minutes) *</label>
                                <input type="number" name="durationMinutes" class="form-control" value="30" min="5" required/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Total Marks *</label>
                                <input type="number" name="totalMarks" class="form-control" value="100" min="1" required/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Passing Marks *</label>
                                <input type="number" name="passingMarks" class="form-control" value="40" min="1" required/>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-arrow-right-circle me-2"></i>Create & Add Questions
                            </button>
                            <a th:href="@{/admin/exams}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
